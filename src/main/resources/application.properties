spring.application.name=quant-trading-assistant
spring.profiles.active=local

server.port=8080

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true

# MyBatis is shared by every runtime profile. Keep mapper discovery here so
# local, test and Docker deployments load the same XML statements.
mybatis.mapper-locations=classpath:mapper/**/*.xml
mybatis.type-aliases-package=com.quant.trade.*.model
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.configuration.default-fetch-size=100
mybatis.configuration.default-statement-timeout=30

# LongPort quote-only market data provider. Disabled by default.
qta.market-data.longport.enabled=${QTA_LONGPORT_ENABLED:false}
qta.market-data.longport.app-key=${LONGPORT_APP_KEY:}
qta.market-data.longport.app-secret=${LONGPORT_APP_SECRET:}
qta.market-data.longport.access-token=${LONGPORT_ACCESS_TOKEN:}
qta.market-data.longport.timeout-seconds=${QTA_LONGPORT_TIMEOUT_SECONDS:10}
qta.market-data.longport.quote-time-zone=${QTA_LONGPORT_QUOTE_TIME_ZONE:Asia/Shanghai}
qta.market-data.longport.http-url=${LONGPORT_HTTP_URL:}
qta.market-data.longport.quote-websocket-url=${LONGPORT_QUOTE_WEBSOCKET_URL:}

# 单实例盘中分钟 K 调度器。测试 profile 默认关闭并直接调用 scheduler service。
qta.market-data.scheduler.enabled=${QTA_MARKET_DATA_SCHEDULER_ENABLED:true}
qta.market-data.scheduler.scan-delay-ms=${QTA_MARKET_DATA_SCHEDULER_SCAN_DELAY_MS:30000}
qta.market-data.scheduler.initial-delay-ms=${QTA_MARKET_DATA_SCHEDULER_INITIAL_DELAY_MS:5000}
qta.market-data.fake.enabled=${QTA_MARKET_DATA_FAKE_ENABLED:false}
qta.market-data.fake.failure-symbol=${QTA_MARKET_DATA_FAKE_FAILURE_SYMBOL:}

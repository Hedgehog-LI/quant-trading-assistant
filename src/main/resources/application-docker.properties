spring.datasource.url=jdbc:mysql://${QTA_MYSQL_HOST:mysql}:${QTA_MYSQL_PORT:3306}/${QTA_MYSQL_DATABASE:quant_trading_assistant}?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
spring.datasource.username=${QTA_MYSQL_USER:qta}
spring.datasource.password=${QTA_MYSQL_PASSWORD:qta_dev_password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

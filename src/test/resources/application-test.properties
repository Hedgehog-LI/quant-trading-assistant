# H2 in-memory database for testing (MySQL compatibility mode)
spring.datasource.url=jdbc:h2:mem:qta_test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# MyBatis
mybatis.mapper-locations=classpath:mapper/**/*.xml
mybatis.type-aliases-package=com.quant.trade.*.model
mybatis.configuration.map-underscore-to-camel-case=true

# Flyway: enable for tests to create tables from migration scripts
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

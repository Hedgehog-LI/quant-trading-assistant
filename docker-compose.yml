services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: qta-server
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: docker
      TZ: Asia/Shanghai
      JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=75.0"
      QTA_MYSQL_HOST: mysql
      QTA_MYSQL_PORT: 3306
      QTA_MYSQL_DATABASE: ${QTA_MYSQL_DATABASE:-quant_trading_assistant}
      QTA_MYSQL_USER: ${QTA_MYSQL_USER:-qta}
      QTA_MYSQL_PASSWORD: ${QTA_MYSQL_PASSWORD:-qta_dev_password}
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy

  mysql:
    image: mysql:8.4
    container_name: qta-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${QTA_MYSQL_ROOT_PASSWORD:-qta_root_password}
      MYSQL_DATABASE: ${QTA_MYSQL_DATABASE:-quant_trading_assistant}
      MYSQL_USER: ${QTA_MYSQL_USER:-qta}
      MYSQL_PASSWORD: ${QTA_MYSQL_PASSWORD:-qta_dev_password}
      TZ: Asia/Shanghai
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - qta_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  qta_mysql_data:
